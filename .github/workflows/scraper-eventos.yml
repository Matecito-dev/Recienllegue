name: Scraper de eventos — Pergamino

on:
  # Corre el día 2 de cada mes a las 11:00 UTC (08:00 Argentina)
  schedule:
    - cron: '0 11 2 * *'

  # Ejecutable manualmente desde la pestaña Actions en GitHub
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias del scraper
        run: npm install
        working-directory: scripts

      - name: Instalar Chromium para Puppeteer
        run: npx puppeteer browsers install chrome
        working-directory: scripts

      - name: Ejecutar scraper de eventos
        run: node scraper-eventos-matebase.js
        working-directory: scripts
        env:
          NEXT_PUBLIC_MATECITODB_URL: ${{ secrets.MATECITODB_URL }}
          MATECITODB_SERVICE_KEY: ${{ secrets.MATECITODB_SERVICE_KEY }}
